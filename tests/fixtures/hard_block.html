<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="robots" content="NOINDEX, NOFOLLOW">
  <title>403 Forbidden</title>
  <!-- ServicePipe's terminal 403 block page. The persistent profile's
       ServicePipe session is blacklisted, so no proof-of-work or captcha
       clears it. Deliberately carries a robots NOINDEX (a _CHALLENGE_MARKER)
       to prove the hard-block predicate is evaluated before the challenge
       one — otherwise this page would misclassify as a solvable challenge. -->
</head>
<body>
  <h1>Forbidden</h1>
  <p>Your request was blocked by ServicePipe.</p>
  <p>If you are not a bot, please copy the report below and send it to our
     support team so we can restore your access.</p>
  <pre class="sp-report">block-id: 0x1f4; reason: session-blacklisted; ip: 203.0.113.7</pre>
</body>
</html>
